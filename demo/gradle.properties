# Native framework linking (linkDebugFrameworkTvos*) for this graph (material3 + navigation +
# lifecycle-viewmodel, each pulling their own transitive androidx graphs) needs more heap than
# Gradle's daemon default; without this the K2/Native linker OOMs ("Java heap space") partway
# through linkDebugFrameworkTvosSimulatorArm64 (observed during task-10c verification).
org.gradle.jvmargs=-Xmx4g
